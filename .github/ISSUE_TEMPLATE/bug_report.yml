name: Bug Report
description: Report a reproducible problem in a task, script, install flow, or repository behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the problem.
      placeholder: instinct-play fails to load a run for Instinct-Parkour-Target-Amp-G1-Play-v0
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      options:
        - Locomotion
        - Shadowing
        - Perceptive
        - Parkour
        - Motion reference
        - Assets / sensors / terrains
        - Packaging / install / docs
        - Other
    validations:
      required: true

  - type: input
    id: task_id
    attributes:
      label: Task ID
      description: If relevant, provide the exact task ID.
      placeholder: Instinct-Perceptive-Shadowing-G1-v0

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Share OS, Python version, GPU/CUDA details, and installed dependency versions if relevant.
      placeholder: |
        OS:
        Python:
        GPU:
        mjlab commit:
        instinct_rl commit:
        Instinct_MJ commit:
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction command and steps
      description: Provide the exact command(s) and minimal steps to reproduce.
      placeholder: |
        1. uv sync
        2. instinct-play Instinct-Locomotion-Flat-G1-Play-v0 --load-run ...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste the relevant traceback, warning, or screenshots if available.
      render: shell
