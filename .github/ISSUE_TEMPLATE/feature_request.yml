name: Feature Request
description: Propose a new capability, task addition, workflow improvement, or repository enhancement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: input
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the request.
      placeholder: Add a documented evaluation command for exported ONNX policies
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Requested scope
      options:
        - New task or task variant
        - Existing task improvement
        - Tooling / scripts
        - Packaging / install
        - Documentation
        - Repository process
        - Other
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this useful? What workflow or problem does it address?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the preferred solution or user experience.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe workarounds or alternative solutions if applicable.

  - type: textarea
    id: validation
    attributes:
      label: Success criteria
      description: How should maintainers verify that the feature is complete?
      placeholder: |
        - command exists
        - README updated
        - target task path validated
